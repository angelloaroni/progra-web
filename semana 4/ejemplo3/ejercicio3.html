<html>
<head>
    <title>Ejercicio 1</title>  
</head>
<body>
    <h1>Hola Mundo</h1>
    <p id = "texto">Este es un ejemplo de html básico</p>
    <!--cuando se le da click al boton, se oculta el elemento con id "texto"-->
    <button onclick="document.getElementById('texto').style.display = 'none'">
        Click para ocultar el texto
    </button>
    <button onclick="document.getElementById('texto').style.display = 'block'">mostrar</button>
</body>
</html>
