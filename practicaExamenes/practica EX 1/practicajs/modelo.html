<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio de JS</title>
    <script src="script.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: #0F172A;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
            font-size: 16px;
        }
        .caja {
            width: 300px;
            padding: 20px;
            border: 2px solid #3B82F6;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s ease; /* Para que los cambios se vean fluidos */
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #3B82F6;
            color: white;
            border: none;
            border-radius: 5px;
            margin: 5px;
        }
        button:hover { background-color: #2563EB; }
        .input-group { margin: 20px; }
    </style>
</head>
<body>

    <h1>Práctica de Interactividad</h1>

    <div id="miCaja" class="caja">
        <p id="texto">¡Hola, Angello! Soy un texto dinámico.</p>
    </div>

    <div class="controles">
        <button id="btnColor" onclick="cambiarColorCaja()">Cambiar Color</button>
        <button id="btnSize" onclick="aumentarTamaño()">Aumentar Tamaño</button>
        <button id="btnFondo">Modo Claro/Oscuro</button>
    </div>

    <div class="input-group">
        <input type="text" id="inputTexto" placeholder="Escribe algo aquí...">
        <button id="btnActualizar" onclick="actualizarTexto()">Actualizar Texto</button>
    </div>

    <script>
    </script>
</body>
</html>
